    /** Advance skin after a finished level (complete or timeout). */
    function advanceThemeAfterLevel() {
      const cur = state.settings && Number.isFinite(state.settings.themeIndex)
        ? state.settings.themeIndex
        : 0;
      const next = (cur + 1) % COLOR_THEMES.length;
      applyTheme(next);
    }

    function computeLevelDurationMs(sessionTotal) {
      const settings = state.settings;
      const base = settings.levelDurationMs;
      if (!settings.adaptiveLevelTime) return base;
      const msPerPair = resolveMsPerPair(settings);
      if (!(msPerPair > 0)) return base;
      const total = Math.max(1, sessionTotal || settings.lastLevelPairs || 1);
      const tolerance = Number.isFinite(settings.levelTimeTolerance) ? settings.levelTimeTolerance : 0.2;
      // Project from real clear pace × this queue size — never reuse the previous countdown allotment.
      const withMargin = msPerPair * total * (1 + Math.max(0, tolerance));
      return Math.round(clampNumber(withMargin, 20000, 900000, base));
    }

    /**
     * Record pace from real work only (levelStartedAt → last correct pair).
     * Never uses the countdown allotment as "completion time".
     *
     * Incomplete / timeout: completed pairs may be << sessionTotal. Still sample
     * throughput as actualWorkMs / completedPairs, then next budget =
     * msPerPair × nextQueueSize × (1+tol). Extra margin when unfinished.
     */
    function recordLevelPace(reason) {
      const pairs = Math.max(0, state.completedThisRun || 0);
      if (pairs < 1) return;
      const endAt = state.lastPairAt > 0 ? state.lastPairAt : performance.now();
      const actualWorkMs = Math.max(1, Math.round(endAt - state.levelStartedAt));
      // Throughput from pairs actually finished — not "prescribed word count".
      const sample = actualWorkMs / pairs;
      const prev = resolveMsPerPair(state.settings);
      let blended = prev > 0 ? prev * 0.35 + sample * 0.65 : sample;
      // Timed out or cleared fewer than the level queue: need more budget next time.
      const prescribed = Math.max(1, state.sessionTotal || pairs);
      const unfinished = reason === "timeout" || pairs < prescribed;
      if (unfinished) {
        blended *= 1.08;
      }
      state.settings.lastMsPerPair = Math.round(blended);
      state.settings.lastLevelMs = Math.round(blended * pairs);
      state.settings.lastLevelPairs = pairs;
      state.settings.lastLevelComplete = !unfinished;
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function isDueForReview(word, now = Date.now()) {
      return word.nextReviewAt > 0 && word.nextReviewAt <= now;
    }

    function reviewUrgency(word, now = Date.now()) {
      if (!word.nextReviewAt) return 0;
      return Math.max(0, now - word.nextReviewAt) / 60000;
    }

    function weakness(word) {
      const drawPressure = Math.max(0, 4 - (word.draws || 0)) * 2;
      const spacingPressure = word.lastDrawRound ? Math.min(6, Math.max(0, state.round - word.lastDrawRound)) : 4;
      return word.mistakes * 6
        + Math.max(0, 2 - word.streak) * 3
        + (word.seen ? 0 : 3)
        + (word.lastMs > 4200 ? 2 : 0)
        + (isDueForReview(word) ? 8 : 0)
        + Math.min(6, reviewUrgency(word))
        + drawPressure
        + spacingPressure;
    }

    function applyReviewSuccess(word) {
      const now = Date.now();
      const nextLevel = Math.min(word.reviewLevel + 1, REVIEW_INTERVALS.length);
      const interval = REVIEW_INTERVALS[Math.max(0, nextLevel - 1)] || REVIEW_INTERVALS[REVIEW_INTERVALS.length - 1];
      word.reviewLevel = nextLevel;
      word.lastReviewedAt = now;
      word.nextReviewAt = now + interval;
      word.mastered = word.streak >= 2 && word.reviewLevel >= 2;
    }

    function applyReviewFailure(word) {
      const now = Date.now();
      word.reviewLevel = 0;
      word.lastReviewedAt = now;
      word.nextReviewAt = now + REVIEW_INTERVALS[0];
      word.mastered = false;
    }

    function chooseRound() {
      const unmastered = state.words.filter(word => !word.mastered);
      if (!unmastered.length) return [];

      if (state.mode === "all") {
        return unmastered.sort((a, b) => a.id.localeCompare(b.id)).slice(0, 5);
      }

      const weak = unmastered
        .filter(word => word.mistakes > 0 || word.streak < 2)
        .sort((a, b) => weakness(b) - weakness(a));

      if (state.mode === "weak") {
        return (weak.length ? weak : unmastered).slice(0, 5);
      }

      const unseen = unmastered.filter(word => word.seen === 0);
      let pool = [...weak.slice(0, 4), ...unseen.slice(0, 2)];
      pool = Array.from(new Map(pool.map(word => [word.id, word])).values());
      if (pool.length < 5) {
        pool = [...pool, ...unmastered.filter(word => !pool.includes(word))];
      }
      return pool.slice(0, 5);
    }

    function renderRound() {
      state.selected = null;
      state.solvedIds = new Set();
      state.activePairs = chooseRound();
      state.roundStartedAt = performance.now();

      if (!state.activePairs.length) {
        showCompletion(true);
        return;
      }

      els.practiceView.classList.remove("hidden");
      els.completionView.classList.remove("show");
      els.roundLabel.textContent = t("lesson.roundN", { n: state.round });
      els.feedback.className = "feedback";
      els.feedback.textContent = t("feedback.pickPair");
      if (els.checkBtn) els.checkBtn.disabled = true;
      els.matchGrid.innerHTML = "";

      const zhTiles = shuffle(state.activePairs).map(word => ({ word, type: "zh" }));
      const enTiles = shuffle(state.activePairs).map(word => ({ word, type: "en" }));
      state.activeTiles = [...zhTiles, ...enTiles].map((tile, index) => ({
        ...tile,
        key: index === 9 ? "0" : String(index + 1)
      }));

      state.activeTiles.forEach(tile => els.matchGrid.appendChild(makeCard(tile)));
      renderStats();
    }

    function makeCard(tile) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "match-card";
      button.dataset.id = tile.word.id;
      button.dataset.type = tile.type;
      button.dataset.key = tile.key;
      button.innerHTML = `<span class="num">${tile.key}</span><span class="word">${tile.type === "en" ? tile.word.en : tile.word.zh}</span>`;
      button.addEventListener("click", () => selectCard(button, tile.word, tile.type));
      return button;
    }

    function selectCard(card, word, type) {
      if (card.classList.contains("paired")) return;
      clearWrong();

      if (!state.selected) {
        state.selected = { card, word, type };
        card.classList.add("selected");
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.pickMatch");
        return;
      }

      if (state.selected.card === card) {
        card.classList.remove("selected");
        state.selected = null;
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.pickPair");
        return;
      }

      const first = state.selected;
      const matched = first.word.id === word.id && first.type !== type;

      if (matched) {
        markCorrect(first.card, card, word);
      } else {
        markWrong(first, { card, word, type });
      }

      saveWords();
      renderStats();
    }

    function markCorrect(firstCard, secondCard, word) {
      const elapsed = Math.round(performance.now() - state.roundStartedAt);
      word.seen += 1;
      word.correct += 1;
      word.streak += 1;
      word.lastMs = elapsed;
      applyReviewSuccess(word);

      state.score += 1;
      state.streak += 1;
      state.solvedIds.add(word.id);
      state.selected = null;
      state.roundStartedAt = performance.now();

      firstCard.classList.remove("selected");
      firstCard.classList.add("paired");
      secondCard.classList.add("paired");

      const finished = state.solvedIds.size === state.activePairs.length;
      els.feedback.className = finished ? "feedback good" : "feedback";
      els.feedback.textContent = finished ? t("feedback.allDoneCheck") : t("feedback.correct");
      if (els.checkBtn) els.checkBtn.disabled = !finished;
    }

    function markWrong(first, second) {
      first.word.mistakes += 1;
      second.word.mistakes += 1;
      first.word.streak = 0;
      second.word.streak = 0;
      first.word.mastered = false;
      second.word.mastered = false;

      state.mistakes += 1;
      state.streak = 0;
      state.selected = null;

      first.card.classList.remove("selected");
      first.card.classList.add("wrong");
      second.card.classList.add("wrong");

      els.feedback.className = "feedback bad";
      els.feedback.textContent = t("feedback.wrong", { a: first.word.en, b: first.word.zh });
    }

    function clearWrong() {
      document.querySelectorAll(".match-card.wrong").forEach(card => card.classList.remove("wrong"));
    }

    function showCompletion(allDone) {
      els.practiceView.classList.add("hidden");
      els.completionView.classList.add("show");
      if (els.checkBtn) els.checkBtn.disabled = true;
      const remaining = state.words.filter(word => !word.mastered).length;
      els.completionTitle.textContent = allDone ? t("timeouts.allPass") : t("timeouts.roundOver");
      els.completionText.textContent = allDone
        ? t("timeouts.allDoneText")
        : t("timeouts.remainingUnstable", { n: remaining });
      els.feedback.className = "feedback good";
      els.feedback.textContent = allDone ? t("feedback.libraryComplete") : t("feedback.continueNext");
      saveWords();
      renderStats();
    }

    function renderStats() {
      const mastered = state.words.filter(word => word.mastered).length;
      const remaining = state.words.length - mastered;
      const pct = state.words.length ? Math.round(mastered / state.words.length * 100) : 0;
      els.progressFill.style.width = `${pct}%`;
      els.topCount.textContent = `${state.solvedIds.size * 2}/${state.activePairs.length * 2 || 10}`;
      els.score.textContent = state.score;
      els.mistakes.textContent = state.mistakes;
      els.streak.textContent = state.streak;
      els.remaining.textContent = remaining;
      els.librarySummary.textContent = t("library.summary", { n: state.words.length, m: state.words.filter(word => word.custom).length });

      const weak = state.words
        .filter(word => !word.mastered)
        .sort((a, b) => weakness(b) - weakness(a))
        .slice(0, 6);

      els.weakList.innerHTML = weak.length
        ? weak.map(word => `<div class="weak-row"><b>${word.en}</b><span>${word.mistakes ? t("weak.wrongN", { n: word.mistakes }) : t("weak.toConsolidate")}</span></div>`).join("")
        : `<div class="weak-row"><b>${t("weak.noWeak")}</b><span>${t("weak.done")}</span></div>`;

      renderCustomList();
    }

    function renderCustomList() {
      els.customList.innerHTML = state.words.length
        ? state.words.map(word => `
          <div class="custom-row">
            <b title="${word.en}">${word.en}</b>
            <span title="${word.zh}">${word.zh}</span>
            <span title="${t("library.drawProb", { p: Number(word.drawProbability || 1).toFixed(2) })}">${t("library.drawCount", { n: word.draws || 0 })}</span>
            <button class="link-button" type="button" data-delete="${word.id}">${t("library.deleteBtn")}</button>
          </div>
        `).join("")
        : `<div class="custom-row"><b>${t("library.emptyListA")}</b><span>${t("library.emptyListB")}</span><span></span><span></span></div>`;

      els.customList.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => {
          state.words = state.words.filter(word => word.id !== button.dataset.delete);
          saveWords();
          renderRound();
        });
      });
    }

    const SLOT_COUNT = 5;
    const CORRECT_ANIM_MS = 400;
    const WRONG_ANIM_MS = 520;
    const LEVEL_BASE_MS = 120000;
    const LEVEL_VARIANCE_MS = 15000;
    const TIMER_TICK_MS = 250;
    const STREAK_SCALE_SEMITONES = [0, 2, 4, 5, 7, 9, 11];
    const STREAK_BASE_FREQ = 261.63;
    const STREAK_GROUP_SIZE = 5;
    const STREAK_GROUP_STEP = 2;
    const STREAK_START_STEP = 1;
    const STREAK_CYCLE_GROUPS = 8;
    const PIANO_INHARMONICITY = 0.00012;
    let streakAudioCtx = null;

    function ensureStreakAudio() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      if (!streakAudioCtx) streakAudioCtx = new Ctx();
      if (streakAudioCtx.state === "suspended") streakAudioCtx.resume();
      return streakAudioCtx;
    }

    function streakToneFrequency(streak) {
      const step = Math.max(0, streak - 1);
      const scaleLen = STREAK_SCALE_SEMITONES.length;
      const group = Math.floor(step / STREAK_GROUP_SIZE) % STREAK_CYCLE_GROUPS;
      const within = step % STREAK_GROUP_SIZE;
      const degree = STREAK_START_STEP * group + STREAK_GROUP_STEP * within;
      const index = ((degree % scaleLen) + scaleLen) % scaleLen;
      const semitone = STREAK_SCALE_SEMITONES[index] + 12 * Math.floor(degree / scaleLen);
      return STREAK_BASE_FREQ * Math.pow(2, semitone / 12);
    }

    function playPianoNote(freq, durationSec = 0.9, velocity = 0.2) {
      const ctx = ensureStreakAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.linearRampToValueAtTime(velocity, now + 0.004);
      master.gain.exponentialRampToValueAtTime(Math.max(0.0001, velocity * 0.38), now + 0.14);
      master.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);
      master.connect(ctx.destination);

      [
        { n: 1, amp: 1, decay: 1 },
        { n: 2, amp: 0.52, decay: 0.74 },
        { n: 3, amp: 0.3, decay: 0.56 },
        { n: 4, amp: 0.17, decay: 0.42 },
        { n: 5, amp: 0.11, decay: 0.32 },
        { n: 6, amp: 0.07, decay: 0.24 },
        { n: 7, amp: 0.045, decay: 0.18 },
        { n: 8, amp: 0.03, decay: 0.14 }
      ].forEach(partial => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const partialFreq = freq * partial.n * Math.sqrt(1 + PIANO_INHARMONICITY * partial.n * partial.n);
        osc.type = "sine";
        osc.frequency.setValueAtTime(partialFreq, now);
        const decaySec = Math.max(0.1, durationSec * partial.decay);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(partial.amp, now + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + decaySec);
        osc.connect(gain).connect(master);
        osc.start(now);
        osc.stop(now + durationSec + 0.05);
      });

      const noiseLen = Math.max(1, Math.floor(ctx.sampleRate * 0.018));
      const noiseBuffer = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseLen; i += 1) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (noiseLen * 0.12));
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.setValueAtTime(Math.min(5200, Math.max(900, freq * 7)), now);
      noiseFilter.Q.setValueAtTime(1.1, now);
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(velocity * 0.07, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.022);
      noise.connect(noiseFilter).connect(noiseGain).connect(master);
      noise.start(now);
      noise.stop(now + 0.03);
    }

    function playGroupEndFlourish(freq) {
      playPianoNote(freq, 0.95, 0.18);
      playPianoNote(freq * 2, 0.72, 0.12);
      setTimeout(() => playPianoNote(freq * 3, 0.42, 0.07), 45);
    }

    function playStreakTone(streak) {
      if (state.settings.streakTones === false) return;
      const freq = streakToneFrequency(streak);
      if (streak > 0 && streak % STREAK_GROUP_SIZE === 0) {
        playGroupEndFlourish(freq);
      } else {
        playPianoNote(freq, 0.88, 0.2);
      }
    }

    function playMistakeTone() {
      if (state.settings.streakTones === false) return;
      playPianoNote(146.83, 0.42, 0.12);
      setTimeout(() => playPianoNote(110, 0.35, 0.08), 55);
    }
    const REVIEW_INTERVALS = [
      5 * 60 * 1000,
      30 * 60 * 1000,
      12 * 60 * 60 * 1000,
      24 * 60 * 60 * 1000,
      3 * 24 * 60 * 60 * 1000,
      7 * 24 * 60 * 60 * 1000,
      15 * 24 * 60 * 60 * 1000
    ];

    function randomBetween(min, max) {
      return Math.floor(min + Math.random() * (max - min + 1));
    }

    function formatTime(ms) {
      const seconds = Math.max(0, Math.ceil(ms / 1000));
      const minutes = Math.floor(seconds / 60);
      return `${minutes}:${String(seconds % 60).padStart(2, "0")}`;
    }

    function clearRefillPipeline() {
      state.refillTimers.forEach(timerId => clearTimeout(timerId));
      state.refillTimers = [];
      state.refillPipelineActive = false;
      if (state.refillHoldTimer) {
        clearTimeout(state.refillHoldTimer);
        state.refillHoldTimer = null;
      }
    }

    function clearLevelTimers() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      clearRefillPipeline();
    }

    function stopLevelCountdown() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      // Freeze displayed remaining time at the moment work finished.
      if (state.levelEndsAt > 0) {
        state.levelTimeLeftMs = Math.max(0, Math.round(state.levelEndsAt - performance.now()));
        state.levelEndsAt = 0;
      }
    }

    function isLevelOver() {
      return state.levelEndsAt > 0 && performance.now() >= state.levelEndsAt;
    }

    function startLevelTimer() {
      if (state.timerId) clearInterval(state.timerId);
      state.levelTimeLeftMs = null;
      state.timerId = setInterval(() => {
        if (els.completionView.classList.contains("show") || state.roundComplete) {
          stopLevelCountdown();
          return;
        }
        renderStats();
        if (isLevelOver()) {
          handleLevelTimeout();
        }
      }, TIMER_TICK_MS);
    }

    function handleLevelTimeout() {
      if (els.completionView.classList.contains("show")) return;
      state.selected = null;
      state.locked = true;
      showCompletion(false, "timeout");
    }

    function buildWordQueue() {
      const now = Date.now();
      let eligible = state.words.filter(word => !word.mastered || isDueForReview(word, now));
      if (!eligible.length && state.settings.recycleMastered) {
        eligible = [...state.words];
      }
      if (!eligible.length) return [];

      if (state.mode === "all") {
        return buildSequentialWordQueue(eligible);
      }

      const due = [...eligible]
        .filter(word => isDueForReview(word, now))
        .sort((a, b) => weakness(b) - weakness(a));

      const weak = [...eligible]
        .filter(word => word.mistakes > 0 || word.streak < 2)
        .sort((a, b) => weakness(b) - weakness(a));

      if (state.mode === "weak") {
        const weakPool = Array.from(new Map([...due, ...weak].map(word => [word.id, word])).values());
        return buildAdaptiveWordQueue(weakPool.length ? weakPool : eligible, now);
      }

      const unseen = eligible.filter(word => word.seen === 0);
      const pool = Array.from(new Map([...due, ...weak, ...unseen, ...eligible].map(word => [word.id, word])).values());
      return buildAdaptiveWordQueue(pool, now);
    }

    function buildSequentialWordQueue(words) {
      const ordered = [...words].sort((a, b) => a.id.localeCompare(b.id));
      if (!state.drawHistory.length) return ordered;
      const lastId = state.drawHistory[state.drawHistory.length - 1];
      const lastIndex = ordered.findIndex(word => word.id === lastId);
      if (lastIndex < 0) return ordered;
      return [...ordered.slice(lastIndex + 1), ...ordered.slice(0, lastIndex + 1)];
    }

    function buildAdaptiveWordQueue(words, now = Date.now()) {
      let candidatePool = [...words];
      const selected = [];
      while (candidatePool.length) {
        const next = selectAdaptiveWord(candidatePool, selected, now);
        if (!next) break;
        selected.push(next);
        candidatePool = candidatePool.filter(word => word.id !== next.id);
      }
      return selected;
    }

    function selectAdaptiveWord(candidatePool, alreadySelected, now) {
      const valid = candidatePool.filter(word => !alreadySelected.some(selected => selected.id === word.id));
      if (!valid.length) return null;
      if (valid.length === 1) return valid[0];

      const drawCounts = valid.map(word => word.draws || 0);
      const minDraws = Math.min(...drawCounts);
      const maxDraws = Math.max(...drawCounts);
      if (maxDraws - minDraws >= 3) {
        return shuffle(valid.filter(word => (word.draws || 0) === minDraws))[0];
      }

      const averageDraws = drawCounts.reduce((sum, count) => sum + count, 0) / drawCounts.length;
      const balancedPool = valid.filter(word => (word.draws || 0) <= averageDraws);
      const pool = balancedPool.length >= 2 ? balancedPool : valid;
      return weightedRandomWord(pool, now);
    }

    function weightedRandomWord(words, now) {
      const weights = words.map(word => {
        const weight = adaptiveWordWeight(word, now);
        word.drawProbability = weight;
        return weight;
      });
      const total = weights.reduce((sum, weight) => sum + weight, 0);
      if (total <= 0) return words[0];
      let cursor = Math.random() * total;
      for (let index = 0; index < words.length; index += 1) {
        cursor -= weights[index];
        if (cursor <= 0) return words[index];
      }
      return words[words.length - 1];
    }

    function adaptiveWordWeight(word, now) {
      const totalDraws = state.words.reduce((sum, item) => sum + (item.draws || 0), 0);
      const averageDraws = state.words.length ? totalDraws / state.words.length : 0;
      const drawCount = word.draws || 0;
      const recentHistory = state.settings.mlRecentHistory
        ? state.drawHistory.slice(-state.settings.mlRecentHistory)
        : [];
      const recentCount = recentHistory.filter(id => id === word.id).length;
      const recentFrequency = recentHistory.length ? recentCount / recentHistory.length : 0;
      const recentReduction = Math.max(0.05, 1 - recentFrequency * state.settings.mlAvoidanceWeight);
      const lastDrawn = recentHistory[recentHistory.length - 1] === word.id ? 0.2 : 1;
      const lowFrequencyBoost = drawCount < averageDraws ? 1 + Math.min(2, averageDraws - drawCount) : 1;
      const highFrequencyReduction = drawCount > averageDraws + 1 ? 0.72 : 1;
      const reviewBoost = isDueForReview(word, now) ? 2 : 1;
      const weakBoost = 1 + Math.min(3, weakness(word) / 10);
      const masteredReduction = word.mastered && !isDueForReview(word, now) ? 0.55 : 1;
      return Math.max(0.01, recentReduction * lastDrawn * lowFrequencyBoost * highFrequencyReduction * reviewBoost * weakBoost * masteredReduction);
    }

    function slotKey(side, index) {
      if (side === "left") return String(index + 1);
      return index === SLOT_COUNT - 1 ? "0" : String(index + 1 + SLOT_COUNT);
    }

    function makeSlot(side, index, word = null, entering = false) {
      return {
        side,
        index,
        key: slotKey(side, index),
        word,
        entering
      };
    }

    function renderRound() {
      clearLevelTimers();
      state.selected = null;
      state.locked = false;
      state.completedThisRun = 0;
      state.roundComplete = false;
      state.refillPipelineActive = false;

      if (!state.words.length) {
        showEmptyLibraryPrompt();
        return;
      }

      const levelWords = buildWordQueue();
      state.sessionTotal = levelWords.length;
      const now = performance.now();
      state.levelStartedAt = now;
      state.roundStartedAt = now;
      state.lastPairAt = 0;
      state.levelTimeLeftMs = null;
      state.levelDurationMs = computeLevelDurationMs(state.sessionTotal);
      state.levelEndsAt = now + state.levelDurationMs;
      state.levelTimeIsAdaptive = Boolean(
        state.settings.adaptiveLevelTime
        && resolveMsPerPair(state.settings) > 0
      );

      if (!state.sessionTotal) {
        showCompletion(true);
        return;
      }

      const initialWords = levelWords.slice(0, SLOT_COUNT);
      state.halfDeck = levelWords.slice(initialWords.length);
      state.unmatchedLeft = [];
      state.unmatchedRight = [];
      initialWords.forEach(word => markWordDrawn(word));

      const leftWords = shuffle([...initialWords]);
      state.leftSlots = Array.from({ length: SLOT_COUNT }, (_, index) => makeSlot("left", index, leftWords[index] || null));
      const rightWords = shuffle([...initialWords]);
      state.rightSlots = Array.from({ length: SLOT_COUNT }, (_, index) => makeSlot("right", index, rightWords[index] || null));

      els.practiceView.classList.remove("hidden");
      els.completionView.classList.remove("show");
      els.roundLabel.textContent = t("lesson.roundLevel", { n: state.round, done: 0, total: state.sessionTotal });
      els.feedback.className = "feedback";
      const timeLabel = formatTime(state.levelDurationMs);
      if (state.levelTimeIsAdaptive) {
        const tolPct = Math.round((state.settings.levelTimeTolerance || 0) * 100);
        els.feedback.textContent = t("feedback.timeAdaptive", { t: timeLabel, tol: tolPct });
      } else {
        els.feedback.textContent = t("feedback.timeChallenge", { t: timeLabel });
      }
      startLevelTimer();
      renderSlots();
      renderStats();
    }

    function renderSlots() {
      const selectedBeforeRender = getSelectionSnapshot();
      const renderedCards = new Map();
      els.matchGrid.innerHTML = "";
      [...state.leftSlots, ...state.rightSlots].forEach(slot => {
        const card = makeCard(slot);
        renderedCards.set(selectionKey(slot.side, slot.index), card);
        els.matchGrid.appendChild(card);
        slot.entering = false;
      });
      restoreSelectionAfterRender(selectedBeforeRender, renderedCards);
    }

    /**
     * Update one slot's DOM only. Avoid wiping the whole grid so an in-progress
     * selection on another card keeps its node and "selected" class.
     */
    function paintSlot(slot) {
      if (!slot) return null;
      const next = makeCard(slot);
      const prev = els.matchGrid.querySelector(
        `.match-card[data-side="${slot.side}"][data-index="${slot.index}"]`
      );
      if (prev) {
        prev.replaceWith(next);
      } else {
        els.matchGrid.appendChild(next);
      }
      slot.entering = false;

      const wordId = selectedWordId();
      if (
        state.selected
        && wordId
        && slot.word
        && slot.word.id === wordId
        && state.selected.side === slot.side
      ) {
        state.selected = {
          card: next,
          side: slot.side,
          index: slot.index,
          slot,
          wordId
        };
        next.classList.add("selected");
      }
      return next;
    }

    function paintSlotPair(leftIndex, rightIndex) {
      paintSlot(state.leftSlots[leftIndex]);
      paintSlot(state.rightSlots[rightIndex]);
      // Re-affirm selection on any untouched card (DOM unchanged) or rebound above.
      rebindSelection();
    }

    function makeCard(slot) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `match-card${slot.word ? "" : " empty"}${slot.entering ? " entering" : ""}`;
      button.dataset.key = slot.key;
      button.dataset.side = slot.side;
      button.dataset.index = String(slot.index);
      button.dataset.id = slot.word ? slot.word.id : "";
      button.disabled = !slot.word;
      const label = slot.word
        ? (slot.side === "left" ? slot.word.zh : slot.word.en)
        : "";
      button.innerHTML = `<span class="num">${slot.key}</span><span class="word">${label}</span>`;
      button.addEventListener("click", () => selectCard(button, slot.side, slot.index));
      return button;
    }

    function getSlot(side, index) {
      return side === "left" ? state.leftSlots[index] : state.rightSlots[index];
    }

    function selectionKey(side, index) {
      return `${side}:${index}`;
    }

    function selectedWordId(sel = state.selected) {
      if (!sel) return "";
      if (sel.wordId) return sel.wordId;
      if (sel.slot && sel.slot.word) return sel.slot.word.id;
      return "";
    }

    function getSelectionSnapshot() {
      if (!state.selected) return null;
      const wordId = selectedWordId();
      if (!wordId) return null;
      return {
        side: state.selected.side,
        index: state.selected.index,
        wordId
      };
    }

    function findCardForSelection(side, index, wordId, renderedCards) {
      if (renderedCards) {
        const byIndex = renderedCards.get(selectionKey(side, index));
        if (byIndex && byIndex.dataset.id === wordId && !byIndex.disabled) return byIndex;
      }
      // Avoid CSS.escape / attribute selector issues: walk nodes and match datasets.
      const cards = els.matchGrid.querySelectorAll(".match-card");
      let fallback = null;
      for (const card of cards) {
        if (card.disabled || card.dataset.side !== side || card.dataset.id !== wordId) continue;
        if (card.dataset.index === String(index)) return card;
        if (!fallback) fallback = card;
      }
      return fallback;
    }

    /**
     * Re-bind selection to current DOM/slot by wordId after refills re-render the grid.
     * Returns true if the selected word is still on the board.
     */
    function rebindSelection(renderedCards) {
      if (!state.selected) return false;
      const side = state.selected.side;
      let index = state.selected.index;
      const wordId = selectedWordId();
      if (!wordId) {
        state.selected = null;
        return false;
      }
      let slot = getSlot(side, index);
      if (!slot || !slot.word || slot.word.id !== wordId) {
        const pool = side === "left" ? state.leftSlots : state.rightSlots;
        const found = pool.findIndex(s => s.word && s.word.id === wordId);
        if (found < 0) {
          if (state.selected.card) state.selected.card.classList.remove("selected");
          state.selected = null;
          return false;
        }
        index = found;
        slot = pool[found];
      }
      const card = findCardForSelection(side, index, wordId, renderedCards);
      if (!card || card.disabled) {
        if (state.selected.card) state.selected.card.classList.remove("selected");
        state.selected = null;
        return false;
      }
      if (state.selected.card && state.selected.card !== card) {
        state.selected.card.classList.remove("selected");
      }
      state.selected = { card, side, index, slot, wordId };
      card.classList.add("selected");
      return true;
    }

    function restoreSelectionAfterRender(snapshot, renderedCards) {
      if (!snapshot) return;
      state.selected = {
        card: null,
        side: snapshot.side,
        index: snapshot.index,
        slot: getSlot(snapshot.side, snapshot.index),
        wordId: snapshot.wordId
      };
      if (!rebindSelection(renderedCards)) {
        state.selected = null;
      }
    }

    function selectCard(card, side, index) {
      if (state.locked || card.disabled || isLevelOver()) return;
      clearWrong();
      // DOM may have been recreated by refill — rebind instead of dropping selection.
      if (state.selected && !rebindSelection()) {
        clearSelection();
      }
      const slot = getSlot(side, index);
      if (!slot || !slot.word) return;

      if (!state.selected) {
        state.selected = { card, side, index, slot, wordId: slot.word.id };
        card.classList.add("selected");
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.pickOtherSide");
        return;
      }

      if (state.selected.side === side && state.selected.index === index) {
        card.classList.remove("selected");
        state.selected = null;
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.pickPair");
        return;
      }

      if (state.selected.side === side) {
        if (state.selected.card) state.selected.card.classList.remove("selected");
        state.selected = { card, side, index, slot, wordId: slot.word.id };
        card.classList.add("selected");
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.switchedSameSide");
        return;
      }

      const first = state.selected;
      const second = { card, side, index, slot, wordId: slot.word.id };
      const firstId = selectedWordId(first);
      if (firstId && firstId === second.wordId) {
        markCorrect(first, second);
      } else {
        markWrong(first, second);
      }
    }

    function isSelectionStillValid() {
      if (!state.selected) return true;
      return rebindSelection();
    }

    function clearSelection(message = "") {
      if (state.selected && state.selected.card) {
        state.selected.card.classList.remove("selected");
      }
      state.selected = null;
      if (message) {
        els.feedback.className = "feedback";
        els.feedback.textContent = message;
      }
    }

    function hasActiveSelection() {
      return Boolean(state.selected && selectedWordId());
    }

    function markCorrect(first, second) {
      if (isLevelOver()) return;
      const word = (first.slot && first.slot.word)
        || getSlot(first.side, first.index)?.word
        || (second.slot && second.slot.word);
      if (!word) return;
      const elapsed = Math.round(performance.now() - state.roundStartedAt);
      word.seen += 1;
      word.correct += 1;
      word.streak += 1;
      word.lastMs = elapsed;
      applyReviewSuccess(word);

      state.score += 1;
      state.streak += 1;
      playStreakTone(state.streak);
      state.completedThisRun += 1;
      state.lastPairAt = performance.now();
      state.selected = null;
      state.locked = true;
      // Reaction timer for the next pair only — does not move levelStartedAt.
      state.roundStartedAt = performance.now();

      first.card.classList.remove("selected");
      first.card.classList.add("correct");
      second.card.classList.add("correct");
      els.feedback.className = "feedback good";
      els.feedback.textContent = t("feedback.correct");
      saveWords();
      renderStats();

      setTimeout(() => {
        if (els.completionView.classList.contains("show")) return;
        if (first.card) first.card.classList.add("replacing");
        if (second.card) second.card.classList.add("replacing");
        const cleared = clearMatchedSlots(first, second);
        // Paint only the two emptied cells — keep all other cards (and any
        // selection the user already made after unlock) intact.
        paintSlotPair(cleared.leftIndex, cleared.rightIndex);
        state.locked = false;
        renderStats();
        // Board empty + no more words: stop clock immediately even if a refill timer is mid-flight.
        if (finishLevelIfDone()) return;
        els.feedback.className = "feedback";
        if (!hasWordsWaiting()) {
          els.feedback.textContent = t("feedback.finishRest");
          return;
        }
        scheduleHoleRefill(cleared.leftIndex, cleared.rightIndex);
      }, CORRECT_ANIM_MS);
    }

    function clearMatchedSlots(first, second) {
      const leftTarget = first.side === "left" ? first : second;
      const rightTarget = first.side === "right" ? first : second;

      state.leftSlots[leftTarget.index] = makeSlot("left", leftTarget.index, null);
      state.rightSlots[rightTarget.index] = makeSlot("right", rightTarget.index, null);
      return { leftIndex: leftTarget.index, rightIndex: rightTarget.index };
    }

    function takeFreshHalf(side) {
      if (!state.halfDeck.length) return null;
      const word = state.halfDeck.shift();
      markWordDrawn(word);
      if (side === "left") {
        state.unmatchedLeft.push(word);
      } else {
        state.unmatchedRight.push(word);
      }
      return word;
    }

    function scheduleHoleRefill(leftIndex, rightIndex) {
      const delayMs = randomBetween(state.settings.refillMinMs, state.settings.refillMaxMs);
      const timerId = setTimeout(() => {
        state.refillTimers = state.refillTimers.filter(id => id !== timerId);
        if (els.completionView.classList.contains("show") || isLevelOver()) return;

        const leftPartner = state.unmatchedRight.length ? state.unmatchedRight.shift() : null;
        const rightPartner = state.unmatchedLeft.length ? state.unmatchedLeft.shift() : null;
        const leftWord = leftPartner || takeFreshHalf("left");
        const rightWord = rightPartner || takeFreshHalf("right");

        if (leftWord) {
          state.leftSlots[leftIndex] = makeSlot("left", leftIndex, leftWord, true);
          paintSlot(state.leftSlots[leftIndex]);
        }
        if (rightWord) {
          state.rightSlots[rightIndex] = makeSlot("right", rightIndex, rightWord, true);
          paintSlot(state.rightSlots[rightIndex]);
        }
        if (leftWord || rightWord) {
          rebindSelection();
          renderStats();
        }
        finishLevelIfDone();
      }, delayMs);
      state.refillTimers.push(timerId);
    }

    function markWordDrawn(word) {
      word.draws = (word.draws || 0) + 1;
      word.lastDrawRound = state.round;
      state.drawHistory.push(word.id);
      const maxHistory = Math.max(100, state.settings.mlRecentHistory * 3);
      if (state.drawHistory.length > maxHistory) {
        state.drawHistory = state.drawHistory.slice(-maxHistory);
      }
      saveWords();
    }

    function markWrong(first, second) {
      if (isLevelOver()) return;
      const firstWord = (first.slot && first.slot.word) || getSlot(first.side, first.index)?.word;
      const secondWord = (second.slot && second.slot.word) || getSlot(second.side, second.index)?.word;
      if (!firstWord || !secondWord) return;
      firstWord.mistakes += 1;
      secondWord.mistakes += 1;
      firstWord.streak = 0;
      secondWord.streak = 0;
      applyReviewFailure(firstWord);
      applyReviewFailure(secondWord);

      state.mistakes += 1;
      state.streak = 0;
      playMistakeTone();
      state.selected = null;
      state.locked = true;

      if (first.card) {
        first.card.classList.remove("selected");
        first.card.classList.add("wrong");
      }
      if (second.card) second.card.classList.add("wrong");
      els.feedback.className = "feedback bad";
      els.feedback.textContent = t("feedback.wrong", { a: firstWord.en, b: firstWord.zh });
      saveWords();
      renderStats();

      setTimeout(() => {
        document.querySelectorAll(".match-card.wrong").forEach(card => card.classList.remove("wrong"));
        state.locked = false;
        els.feedback.className = "feedback";
        els.feedback.textContent = t("feedback.pickPair");
      }, WRONG_ANIM_MS);
    }

    function clearWrong() {
      document.querySelectorAll(".match-card.wrong").forEach(card => card.classList.remove("wrong"));
    }

    function activeSlotPairs() {
      return state.leftSlots.filter(slot => slot.word).length;
    }

    function hasWordsWaiting() {
      return state.halfDeck.length > 0 || state.unmatchedLeft.length > 0 || state.unmatchedRight.length > 0;
    }

    /** True when there is nothing left to match on the board or in queues. */
    function isLevelWorkDone() {
      return !hasWordsWaiting() && activeSlotPairs() === 0;
    }

    function isStreamComplete() {
      return isLevelWorkDone() && !state.refillTimers.length;
    }

    /**
     * If the level's work is finished (early clear), cancel pending refills,
     * stop the countdown, and open the completion screen.
     */
    function finishLevelIfDone(reason = "queue") {
      if (!isLevelWorkDone()) return false;
      if (els.completionView.classList.contains("show")) {
        stopLevelCountdown();
        return true;
      }
      clearRefillPipeline();
      showCompletion(false, reason);
      return true;
    }

    function showCompletion(allDone, reason = "queue") {
      stopLevelCountdown();
      clearLevelTimers();
      clearSelection();
      state.roundComplete = reason !== "timeout";
      // Sample real clear pace only (not the fixed countdown allotment / timeout cutoff).
      recordLevelPace(reason);
      // Each finished level rotates the color skin.
      advanceThemeAfterLevel();
      els.practiceView.classList.add("hidden");
      els.completionView.classList.add("show");
      els.completionBadge.textContent = "✓";
      els.continueBtn.textContent = t("lesson.continueBtn");
      const remaining = state.words.filter(word => !word.mastered || isDueForReview(word)).length;
      els.completionTitle.textContent = allDone ? t("timeouts.allPass") : reason === "timeout" ? t("timeouts.timeUp") : t("timeouts.levelComplete");
      els.completionText.textContent = allDone
        ? t("timeouts.allDoneText")
        : reason === "timeout"
          ? t("timeouts.levelMatched", { n: state.completedThisRun || 0 })
          : remaining
            ? t("timeouts.queueCleared", { n: remaining })
            : t("timeouts.allStable");
      els.feedback.className = "feedback good";
      els.feedback.textContent = allDone ? t("feedback.libraryComplete") : t("feedback.nextLevel");
      saveWords();
      renderStats();
    }

    function showEmptyLibraryPrompt() {
      clearLevelTimers();
      state.halfDeck = [];
      state.unmatchedLeft = [];
      state.unmatchedRight = [];
      state.leftSlots = [];
      state.rightSlots = [];
      state.sessionTotal = 0;
      state.completedThisRun = 0;
      state.roundComplete = false;
      els.practiceView.classList.add("hidden");
      els.completionView.classList.add("show");
      els.completionBadge.textContent = "+";
      els.completionTitle.textContent = t("lesson.emptyTitle");
      els.completionText.textContent = t("lesson.emptyText");
      els.continueBtn.textContent = t("lesson.emptyAddBtn");
      els.feedback.className = "feedback";
      els.feedback.textContent = t("feedback.emptyLib");
      renderStats();
    }

    function renderStats() {
      const mastered = state.words.filter(word => word.mastered && !isDueForReview(word)).length;
      const remaining = state.words.filter(word => !word.mastered || isDueForReview(word)).length;
      const targetTotal = currentRoundTotal();
      const pct = state.roundComplete
        ? 100
        : targetTotal
          ? Math.min(100, Math.round((state.completedThisRun || 0) / targetTotal * 100))
          : 0;
      els.progressFill.style.width = `${pct}%`;
      // Frozen after clear/timeout; otherwise live countdown from levelEndsAt.
      let timeLeft;
      if (state.levelTimeLeftMs != null && (state.roundComplete || els.completionView.classList.contains("show") || !state.levelEndsAt)) {
        timeLeft = state.levelTimeLeftMs;
      } else if (state.levelEndsAt) {
        timeLeft = state.levelEndsAt - performance.now();
      } else {
        timeLeft = state.levelDurationMs;
      }
      els.topCount.textContent = formatTime(timeLeft);
      els.topCount.classList.toggle("time-low", timeLeft <= 15000 && !state.roundComplete && !els.completionView.classList.contains("show"));
      els.roundLabel.textContent = t("lesson.roundLevel", { n: state.round, done: state.completedThisRun || 0, total: targetTotal });
      els.score.textContent = state.score;
      els.mistakes.textContent = state.mistakes;
      els.streak.textContent = state.streak;
      els.remaining.textContent = remaining;
      els.librarySummary.textContent = t("library.summary", { n: state.words.length, m: state.words.filter(word => word.custom).length });

      const weak = state.words
        .filter(word => !word.mastered)
        .sort((a, b) => weakness(b) - weakness(a))
        .slice(0, 6);

      els.weakList.innerHTML = weak.length
        ? weak.map(word => `<div class="weak-row"><b>${word.en}</b><span>${word.mistakes ? t("weak.wrongN", { n: word.mistakes }) : t("weak.toConsolidate")}</span></div>`).join("")
        : `<div class="weak-row"><b>${t("weak.noWeak")}</b><span>${t("weak.done")}</span></div>`;

      renderCustomList();
    }

    function currentRoundTotal() {
      return Math.max(state.sessionTotal || 0, state.completedThisRun || 0);
    }

    function normalizePair(line) {
      const trimmed = line.trim();
      if (!trimmed) return null;
      const parts = trimmed.includes("=")
        ? trimmed.split("=")
        : trimmed.includes("，")
          ? trimmed.split("，")
          : trimmed.split(",");
      if (parts.length < 2) return null;
      const en = parts.shift().trim();
      const zh = parts.join(",").trim();
      return en && zh ? [en, zh] : null;
    }

    function addWords(pairs) {
      const existing = new Set(state.words.map(word => `${word.en.toLowerCase()}::${word.zh}`));
      let added = 0;
      pairs.forEach(pair => {
        if (!pair) return;
        const key = `${pair[0].toLowerCase()}::${pair[1]}`;
        if (existing.has(key)) return;
        existing.add(key);
        state.words.push(createWord(pair[0], pair[1], true, `custom-${Date.now()}-${Math.random().toString(16).slice(2)}`));
        added += 1;
      });

      if (added > 0) {
        saveWords();
        state.round += 1;
        renderRound();
      }
      return added;
    }

    function resetProgress() {
      state.words.forEach(word => {
        word.seen = 0;
        word.correct = 0;
        word.mistakes = 0;
        word.streak = 0;
        word.mastered = false;
        word.lastMs = 0;
        word.reviewLevel = 0;
        word.nextReviewAt = 0;
        word.lastReviewedAt = 0;
        word.draws = 0;
        word.lastDrawRound = 0;
        word.drawProbability = 1;
      });
      state.drawHistory = [];
      state.round = 1;
      state.score = 0;
      state.mistakes = 0;
      state.streak = 0;
      state.settings.lastLevelMs = 0;
      state.settings.lastLevelPairs = 0;
      state.settings.lastMsPerPair = 0;
      state.settings.lastLevelComplete = false;
      saveWords();
      renderRound();
    }

    function toggleMode() {
      const modes = ["adaptive", "weak", "all"];
      const next = modes[(modes.indexOf(state.mode) + 1) % modes.length];
      state.mode = next;
      els.modeBtn.textContent = t("stats.modeBtn", { label: modeLabel(next) });
      state.round += 1;
      saveWords();
      renderRound();
    }

    function openLibrary() {
      els.libraryModal.classList.add("open");
      els.newEnglish.focus();
      syncOptionsUI();
      renderStats();
    }

    function closeLibrary() {
      els.libraryModal.classList.remove("open");
    }

    function applyLangPairLabels(pair) {
      const p = pair || state.settings.langPair;
      if (els.sideLabelA) els.sideLabelA.textContent = p.a;
      if (els.sideLabelB) els.sideLabelB.textContent = p.b;
      if (els.bulkInput) {
        els.bulkInput.placeholder = t("library.bulkPlaceholder", { a: p.a, b: p.b });
      }
    }

    function syncLangPairUI() {
      const select = els.langPairSelect;
      if (!select) return;
      const pair = state.settings.langPair;
      const isCustom = !LANG_PAIR_PRESETS.some(p => p.a === pair.a && p.b === pair.b);
      select.innerHTML = LANG_PAIR_PRESETS.map((p, i) =>
        `<option value="${i}">${p.a} ↔ ${p.b}</option>`
      ).join("") + `<option value="custom">${t("library.custom")}</option>`;
      select.value = isCustom ? "custom" : String(LANG_PAIR_PRESETS.findIndex(p => p.a === pair.a && p.b === pair.b));
      const showCustom = select.value === "custom";
      if (els.langPairCustomRow) els.langPairCustomRow.hidden = !showCustom;
      if (els.langPairCustomRow2) els.langPairCustomRow2.hidden = !showCustom;
      els.langPairA.value = pair.a;
      els.langPairB.value = pair.b;
      applyLangPairLabels(pair);
    }

    function syncOptionsUI() {
      els.levelSeconds.value = Math.round(state.settings.levelDurationMs / 1000);
      if (els.levelTimeTolerance) {
        els.levelTimeTolerance.value = Number(state.settings.levelTimeTolerance).toFixed(2);
      }
      if (els.adaptiveLevelTime) {
        els.adaptiveLevelTime.checked = state.settings.adaptiveLevelTime !== false;
      }
      els.refillTrigger.value = state.settings.refillTriggerCount;
      els.refillMinSeconds.value = (state.settings.refillMinMs / 1000).toFixed(1);
      els.refillMaxSeconds.value = (state.settings.refillMaxMs / 1000).toFixed(1);
      els.mlRecentHistory.value = state.settings.mlRecentHistory;
      els.mlAvoidanceWeight.value = state.settings.mlAvoidanceWeight.toFixed(1);
      els.pauseRefillWhileSelected.checked = state.settings.pauseRefillWhileSelected;
      els.recycleMastered.checked = state.settings.recycleMastered;
      if (els.streakTones) els.streakTones.checked = state.settings.streakTones !== false;
      syncLangPairUI();
    }

    function saveOptionsFromUI() {
      let langPair = state.settings.langPair;
      const select = els.langPairSelect;
      if (select && select.value === "custom") {
        const a = (els.langPairA.value || "").trim();
        const b = (els.langPairB.value || "").trim();
        if (a && b) langPair = { a, b };
      } else if (select) {
        const idx = Number(select.value);
        if (LANG_PAIR_PRESETS[idx]) langPair = { ...LANG_PAIR_PRESETS[idx] };
      }
      const nextSettings = normalizeSettings({
        levelDurationMs: Number(els.levelSeconds.value) * 1000,
        adaptiveLevelTime: els.adaptiveLevelTime ? els.adaptiveLevelTime.checked : true,
        levelTimeTolerance: els.levelTimeTolerance ? Number(els.levelTimeTolerance.value) : 0.2,
        lastMsPerPair: state.settings.lastMsPerPair,
        lastLevelMs: state.settings.lastLevelMs,
        lastLevelPairs: state.settings.lastLevelPairs,
        lastLevelComplete: state.settings.lastLevelComplete,
        themeIndex: state.settings.themeIndex,
        refillTriggerCount: Number(els.refillTrigger.value),
        refillMinMs: Number(els.refillMinSeconds.value) * 1000,
        refillMaxMs: Number(els.refillMaxSeconds.value) * 1000,
        pauseRefillWhileSelected: els.pauseRefillWhileSelected.checked,
        recycleMastered: els.recycleMastered.checked,
        streakTones: els.streakTones ? els.streakTones.checked : true,
        mlRecentHistory: Number(els.mlRecentHistory.value),
        mlAvoidanceWeight: Number(els.mlAvoidanceWeight.value),
        langPair
      });
      state.settings = nextSettings;
      syncOptionsUI();
      saveWords();
      els.feedback.className = "feedback good";
      els.feedback.textContent = t("feedback.optionsSaved");
      renderStats();
    }

    function isIOSDevice() {
      const ua = navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isSafariBrowser() {
      const ua = navigator.userAgent.toLowerCase();
      return /safari/.test(ua) && !/chrome|crios|fxios|edgios|android/.test(ua);
    }

    function isStandaloneApp() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function hasHiddenInstallNudge() {
      try {
        return localStorage.getItem(INSTALL_NUDGE_KEY) === "1";
      } catch (error) {
        return false;
      }
    }

    function rememberInstallNudgeHidden() {
      try {
        localStorage.setItem(INSTALL_NUDGE_KEY, "1");
      } catch (error) {
        // Storage can be unavailable in private browsing; closing still works for this page view.
      }
    }

    function setInstallNudgeCopy() {
      if (deferredInstallPrompt) {
        els.installTitle.textContent = t("install.titleInstall");
        els.installText.textContent = t("install.textInstall");
        els.installAction.textContent = t("install.actionInstall");
        return;
      }

      if (isIOSDevice() || isSafariBrowser()) {
        els.installTitle.textContent = t("install.titleAddHome");
        els.installText.textContent = t("install.textAddHome");
        els.installAction.textContent = t("install.actionGotIt");
        return;
      }

      els.installTitle.textContent = t("install.titleSaveDesktop");
      els.installText.textContent = t("install.textSaveDesktop");
      els.installAction.textContent = t("install.actionGotIt");
    }

    function showInstallNudge() {
      if (!els.installNudge || isStandaloneApp() || hasHiddenInstallNudge()) return;
      setInstallNudgeCopy();
      els.installNudge.classList.add("show");
    }

    function closeInstallNudge(remember = false) {
      if (!els.installNudge) return;
      els.installNudge.classList.remove("show");
      if (remember) rememberInstallNudgeHidden();
    }

    function initInstallNudge() {
      if (!els.installNudge) return;

      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        showInstallNudge();
      });

      window.addEventListener("appinstalled", () => closeInstallNudge(true));

      els.closeInstallNudge.addEventListener("click", () => closeInstallNudge(false));
      els.hideInstallNudge.addEventListener("click", () => closeInstallNudge(true));
      els.installAction.addEventListener("click", async () => {
        if (!deferredInstallPrompt) {
          closeInstallNudge(false);
          return;
        }

        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice.catch(() => null);
        deferredInstallPrompt = null;
        closeInstallNudge(choice && choice.outcome === "accepted");
      });

      setTimeout(() => {
        if (isIOSDevice() || isSafariBrowser()) showInstallNudge();
      }, 900);
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator) || location.protocol === "file:") return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    document.getElementById("openLibrary").addEventListener("click", openLibrary);
    document.getElementById("openLibraryRail").addEventListener("click", openLibrary);
    document.getElementById("openLibraryMobile").addEventListener("click", openLibrary);
    document.getElementById("closeLibrary").addEventListener("click", closeLibrary);
    document.getElementById("modeBtn").addEventListener("click", toggleMode);
    document.getElementById("resetProgress").addEventListener("click", resetProgress);
    document.getElementById("resetRail").addEventListener("click", resetProgress);
    document.getElementById("resetMobile").addEventListener("click", resetProgress);
    document.getElementById("quitBtn").addEventListener("click", resetProgress);
    els.saveOptionsBtn.addEventListener("click", saveOptionsFromUI);
    if (els.langPairSelect) {
      els.langPairSelect.addEventListener("change", () => {
        const isCustom = els.langPairSelect.value === "custom";
        if (els.langPairCustomRow) els.langPairCustomRow.hidden = !isCustom;
        if (els.langPairCustomRow2) els.langPairCustomRow2.hidden = !isCustom;
        if (!isCustom) {
          const idx = Number(els.langPairSelect.value);
          if (LANG_PAIR_PRESETS[idx]) {
            els.langPairA.value = LANG_PAIR_PRESETS[idx].a;
            els.langPairB.value = LANG_PAIR_PRESETS[idx].b;
            applyLangPairLabels(LANG_PAIR_PRESETS[idx]);
          }
        }
      });
    }

    document.getElementById("addOneBtn").addEventListener("click", () => {
      const added = addWords([[els.newEnglish.value.trim(), els.newChinese.value.trim()]]);
      if (added) {
        els.newEnglish.value = "";
        els.newChinese.value = "";
        els.feedback.className = "feedback good";
        els.feedback.textContent = t("feedback.addedOne");
      }
    });

    document.getElementById("addBulkBtn").addEventListener("click", () => {
      const pairs = els.bulkInput.value.split(/\r?\n/).map(normalizePair).filter(Boolean);
      const added = addWords(pairs);
      if (added) {
        els.bulkInput.value = "";
        els.feedback.className = "feedback good";
        els.feedback.textContent = t("feedback.addedN", { n: added });
      }
    });

    document.getElementById("clearCustomBtn").addEventListener("click", () => {
      if (!confirm(t("confirm.clearAllConfirm"))) return;
      state.words = [];
      state.drawHistory = [];
      saveWords();
      renderRound();
    });

    if (els.checkBtn) {
      els.checkBtn.addEventListener("click", () => {
        showCompletion(false);
      });
    }

    els.continueBtn.addEventListener("click", () => {
      if (!state.words.length) {
        openLibrary();
        return;
      }
      state.round += 1;
      saveWords();
      renderRound();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && els.installNudge.classList.contains("show")) {
        closeInstallNudge(false);
        return;
      }
      if (els.libraryModal.classList.contains("open")) {
        if (event.key === "Escape") closeLibrary();
        return;
      }
      if (!/^[0-9]$/.test(event.key)) return;
      const card = document.querySelector(`.match-card[data-key="${event.key}"]`);
      if (!card) return;
      event.preventDefault();
      card.click();
    });

    els.libraryModal.addEventListener("click", event => {
      if (event.target === els.libraryModal) closeLibrary();
    });

    // iOS: block pinch-zoom and two-finger gestures; CSS touch-action handles the rest.
    document.addEventListener("gesturestart", event => event.preventDefault());
    document.addEventListener("gesturechange", event => event.preventDefault());
    document.addEventListener("touchmove", event => {
      if (event.touches.length > 1) event.preventDefault();
    }, { passive: false });

    document.querySelectorAll(".lang-toggle").forEach(btn => {
      btn.addEventListener("click", () => setLang(currentLang === "en" ? "zh" : "en"));
    });
    applyStaticI18n();

    initInstallNudge();
    registerServiceWorker();
    const savedState = readSavedState();
    state.settings = normalizeSettings(loadSettings(savedState));
    state.words = loadWords(savedState);
    state.drawHistory = Array.isArray(savedState && savedState.drawHistory) ? savedState.drawHistory : [];
    if (savedState && ["adaptive", "weak", "all"].includes(savedState.mode)) {
      state.mode = savedState.mode;
    }
    if (savedState) {
      if (Number.isFinite(Number(savedState.round)) && Number(savedState.round) >= 1) {
        state.round = Math.round(Number(savedState.round));
      }
      if (Number.isFinite(Number(savedState.score)) && Number(savedState.score) >= 0) {
        state.score = Math.round(Number(savedState.score));
      }
      if (Number.isFinite(Number(savedState.mistakes)) && Number(savedState.mistakes) >= 0) {
        state.mistakes = Math.round(Number(savedState.mistakes));
      }
      if (Number.isFinite(Number(savedState.streak)) && Number(savedState.streak) >= 0) {
        state.streak = Math.round(Number(savedState.streak));
      }
    }
    els.modeBtn.textContent = t("stats.modeBtn", { label: modeLabel(state.mode) });
    // Restore last skin (settings first, then dedicated key).
    let themeIdx = state.settings.themeIndex;
    try {
      const storedTheme = localStorage.getItem(THEME_KEY);
      if (storedTheme != null && Number.isFinite(Number(storedTheme))) {
        themeIdx = Number(storedTheme);
      }
    } catch (e) {}
    applyTheme(themeIdx);
    syncOptionsUI();
    renderRound();
  </script>
</body>
</html>
