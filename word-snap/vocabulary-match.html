<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" />
  <title>Word Snap</title>
  <meta name="description" content="A fast bilingual vocabulary matching practice app with adaptive review, custom word lists, and PWA install." />
  <meta name="theme-color" content="#131f24" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Word Snap" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <style>
    :root {
      --bg: #131f24;
      --panel: #202f36;
      --panel-2: #1a2a30;
      --line: #37464f;
      --line-strong: #52656d;
      --text: #f1f7fb;
      --muted: #8fa5af;
      --dim: #52656d;
      --green: #58cc02;
      --green-dark: #46a302;
      --blue: #1cb0f6;
      --blue-deep: #1899d6;
      --red: #ff4b4b;
      --red-deep: #ea2b2b;
      --yellow: #ffc800;
      --panel-soft: #17282e;
      --track: #283940;
      --card-shadow: #26363d;
      --selected-bg: #14394a;
      --selected-ink: #ddf4ff;
      --selected-shadow: #0e719d;
      --correct-bg: #183d22;
      --correct-ink: #eaffdf;
      --correct-shadow: #2d7f12;
      --wrong-bg: #461f22;
      --wrong-ink: #ffe8e8;
      --wrong-shadow: #9d2828;
      --on-accent: #102015;
      --warn-ink: #2b1800;
      --warn-shadow: #d99f00;
      --weak-wrong: #ff9a9a;
      --scrim: rgba(10, 18, 21, .72);
      --hover-soft: #20343b;
      --radius: 12px;
      --ease: cubic-bezier(.2, .8, .2, 1);
      --theme-shift: 420ms;
    }

    body,
    .rail,
    .panel,
    .match-card,
    .duo-button,
    .progress-fill,
    .logo,
    .install-nudge {
      transition:
        background-color var(--theme-shift) var(--ease),
        border-color var(--theme-shift) var(--ease),
        color var(--theme-shift) var(--ease),
        box-shadow var(--theme-shift) var(--ease);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 96px 1fr;
    }

    .rail {
      border-right: 2px solid var(--line);
      padding: 28px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .logo {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--on-accent);
      background: var(--green);
      font-size: 26px;
      font-weight: 1000;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .14);
    }

    .rail-btn {
      width: 52px;
      min-height: 52px;
      height: auto;
      display: grid;
      place-items: center;
      text-decoration: none;
      border: 2px solid transparent;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      padding: 6px 3px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.12;
      letter-spacing: -0.02em;
      overflow: hidden;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
      transition: border-color 160ms var(--ease), background 160ms var(--ease), color 160ms var(--ease);
    }

    .rail-btn.active,
    .rail-btn:hover {
      border-color: var(--line);
      color: var(--green);
      background: var(--panel-soft);
    }

    .main {
      min-width: 0;
      display: flex;
      justify-content: center;
      padding: 36px 36px 28px;
    }

    .mobile-nav {
      display: none;
      width: min(760px, 100%);
      margin: 0 auto 18px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .mobile-nav .rail-btn {
      width: auto;
      min-height: 44px;
      height: auto;
      padding: 6px 4px;
      border-color: var(--line);
      background: var(--panel-soft);
      font-size: 11px;
    }

    .lesson {
      width: min(760px, 100%);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: calc(100vh - 64px);
    }

    .lesson-top {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 54px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      color: var(--dim);
      background: transparent;
      cursor: pointer;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .icon-button:hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .progress {
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--track);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width 260ms var(--ease);
    }

    .top-count {
      min-width: 68px;
      color: var(--muted);
      font-weight: 900;
      text-align: right;
    }

    .top-count.time-low {
      color: var(--red);
    }

    .prompt {
      width: min(540px, 100%);
      margin: 0 auto;
    }

    .prompt-kicker {
      color: var(--green);
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 32px;
      line-height: 1.18;
      text-wrap: pretty;
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 255px));
      grid-template-rows: repeat(5, 52px);
      grid-auto-flow: column;
      justify-content: center;
      gap: 10px 30px;
    }

    .match-card {
      height: 52px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: transparent;
      box-shadow: 0 4px 0 var(--card-shadow);
      cursor: pointer;
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      padding: 0 16px 0 12px;
      text-align: left;
      transition: transform 90ms var(--ease), border-color 90ms var(--ease), color 90ms var(--ease), background 90ms var(--ease), box-shadow 90ms var(--ease);
    }

    .match-card:hover {
      border-color: var(--line-strong);
      background: var(--panel-soft);
    }

    .match-card:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--card-shadow);
    }

    .match-card.selected {
      border-color: var(--blue);
      color: var(--selected-ink);
      background: var(--selected-bg);
      box-shadow: 0 4px 0 var(--selected-shadow);
    }

    .match-card.paired {
      opacity: 0;
      pointer-events: none;
      transform: scale(.98);
    }

    .match-card.correct {
      border-color: var(--green);
      color: var(--correct-ink);
      background: var(--correct-bg);
      box-shadow: 0 4px 0 var(--correct-shadow);
      animation: correctPulse 300ms ease;
    }

    .match-card.replacing {
      opacity: 0;
      transform: scale(.96);
      pointer-events: none;
    }

    .match-card.entering {
      animation: cardEnter 900ms var(--ease) both;
    }

    .match-card.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .match-card.is-locked {
      pointer-events: none;
    }

    .match-card.wrong {
      border-color: var(--red);
      color: var(--wrong-ink);
      background: var(--wrong-bg);
      box-shadow: 0 4px 0 var(--wrong-shadow);
      animation: shake 220ms ease;
    }

    .match-card[disabled] {
      cursor: default;
    }

    .num {
      width: 22px;
      display: grid;
      place-items: center;
      color: var(--dim);
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .word {
      min-width: 0;
      overflow: hidden;
      color: inherit;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .duo-button {
      min-width: 150px;
      height: 50px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 16px;
      color: var(--on-accent);
      background: var(--green);
      box-shadow: 0 4px 0 var(--green-dark);
      cursor: pointer;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 1000;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.15;
      transition: transform 90ms var(--ease), box-shadow 90ms var(--ease), filter 90ms var(--ease);
    }

    .duo-button:hover {
      filter: brightness(1.03);
    }

    .duo-button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--green-dark);
    }

    .duo-button.secondary {
      color: var(--blue);
      background: transparent;
      border: 2px solid var(--line);
      box-shadow: 0 4px 0 var(--card-shadow);
    }

    .duo-button.warning {
      color: var(--warn-ink);
      background: var(--yellow);
      box-shadow: 0 4px 0 var(--warn-shadow);
    }

    .duo-button[disabled] {
      color: var(--dim);
      background: var(--track);
      box-shadow: 0 4px 0 var(--card-shadow);
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .panel {
      display: none;
      align-self: start;
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--panel-soft);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px;
      border-bottom: 2px solid var(--line);
    }

    .panel-head h2,
    .modal-card h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    .panel-head p,
    .modal-card p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .stat {
      min-height: 72px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--bg);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .weak-list {
      display: grid;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .weak-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--bg);
    }

    .weak-row b {
      min-width: 0;
      overflow: hidden;
      font-size: 14px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .weak-row span {
      display: grid;
      min-height: 24px;
      place-items: center;
      color: var(--weak-wrong);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .panel-actions {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-top: 2px solid var(--line);
    }

    .small-button {
      min-height: 42px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      color: var(--blue);
      background: var(--bg);
      cursor: pointer;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    .small-button:hover {
      border-color: var(--line-strong);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 20px;
      background: var(--scrim);
    }

    .modal.open {
      display: grid;
    }

    .modal-card {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 40px));
      overflow: auto;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .4);
    }

    .modal-top,
    .modal-section {
      padding: 20px;
      border-bottom: 2px solid var(--line);
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      text-transform: none;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      accent-color: var(--green);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--bg);
      outline: none;
      padding: 12px 13px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue);
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .custom-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .custom-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--bg);
    }

    .custom-row b,
    .custom-row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-button {
      display: inline-grid;
      min-height: 32px;
      place-items: center;
      border: 0;
      color: var(--red);
      background: transparent;
      cursor: pointer;
      padding: 0 8px;
      font-weight: 900;
      text-align: center;
    }

    .completion {
      display: none;
      width: min(540px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    .completion.show {
      display: block;
    }

    .completion-badge {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      margin: 16px auto 18px;
      border-radius: 30px;
      color: var(--on-accent);
      background: var(--green);
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, .16);
      font-size: 56px;
      font-weight: 1000;
    }

    .completion h2 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .completion p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .install-nudge {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      width: min(372px, calc(100vw - 32px));
      border: 2px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      background: var(--panel-soft);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .38), 0 5px 0 var(--card-shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px) scale(.98);
      transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    }

    .install-nudge.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .install-nudge-body {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 14px;
      padding: 18px 18px 16px;
    }

    .install-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--on-accent);
      background: var(--green);
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .16);
      font-size: 24px;
      font-weight: 1000;
    }

    .install-copy h2 {
      margin: 0 34px 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .install-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
      text-wrap: pretty;
    }

    .install-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
    }

    .install-close:hover {
      color: var(--text);
      background: var(--hover-soft);
    }

    .install-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .install-small {
      min-height: 40px;
      display: inline-grid;
      place-items: center;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      color: var(--blue);
      background: var(--bg);
      cursor: pointer;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 1000;
      text-align: center;
      line-height: 1.15;
    }

    .install-small.primary {
      border-color: transparent;
      color: var(--on-accent);
      background: var(--green);
      box-shadow: 0 4px 0 var(--green-dark);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    @keyframes correctPulse {
      0%, 100% { filter: brightness(1); }
      45% { filter: brightness(1.45); }
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1050px) {
      .app {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      .main {
        display: block;
        padding: 28px 18px;
      }

      .mobile-nav {
        display: grid;
      }

      .lesson {
        min-height: auto;
      }

      .panel {
        width: min(760px, 100%);
        justify-self: center;
      }
    }

    @media (max-width: 640px) {
      .lesson-top {
        grid-template-columns: 36px 1fr;
        margin-bottom: 30px;
      }

      .top-count {
        grid-column: 1 / -1;
        text-align: left;
      }

      h1 {
        font-size: 26px;
      }

      .match-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: repeat(5, 52px);
        grid-auto-flow: column;
        gap: 10px;
      }

      .match-card {
        grid-template-columns: 28px minmax(0, 1fr);
        padding: 0 10px 0 8px;
      }

      .num {
        width: 18px;
        font-size: 13px;
      }

      .word {
        font-size: 15px;
      }

      .duo-button {
        width: 100%;
      }

      .form-grid,
      .option-grid,
      .custom-row {
        grid-template-columns: 1fr;
      }

      .install-nudge {
        right: 16px;
        bottom: 16px;
      }

      .install-nudge-body {
        grid-template-columns: 42px 1fr;
        gap: 12px;
        padding: 16px;
      }

      .install-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        font-size: 21px;
      }

      .install-actions {
        padding: 0 16px 16px;
      }
    }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .lang-toggle .lang-opt {
      opacity: .45;
    }
    .lang-toggle .lang-opt.on {
      opacity: 1;
      color: var(--green);
    }
    .lang-toggle .sep {
      opacity: .35;
    }
    .lang-pair-custom {
      grid-column: 1 / -1;
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function loadSettings(saved) {
      const raw = saved && saved.settings ? saved.settings : {};
      let refillMinMs = clampNumber(raw.refillMinMs, 100, 10000, DEFAULT_SETTINGS.refillMinMs);
      let refillMaxMs = clampNumber(raw.refillMaxMs, 100, 15000, DEFAULT_SETTINGS.refillMaxMs);
      // Migrate legacy slow refill (~2s hole appear) to Duo-like fast halves refill.
      if (raw.refillMinMs != null && refillMinMs > 1000) {
        refillMinMs = DEFAULT_SETTINGS.refillMinMs;
        refillMaxMs = DEFAULT_SETTINGS.refillMaxMs;
      }
      if (refillMaxMs < refillMinMs) refillMaxMs = refillMinMs;
      return {
        levelDurationMs: clampNumber(raw.levelDurationMs, 20000, 900000, DEFAULT_SETTINGS.levelDurationMs),
        adaptiveLevelTime: raw.adaptiveLevelTime !== false,
        levelTimeTolerance: clampNumber(raw.levelTimeTolerance, 0, 2, DEFAULT_SETTINGS.levelTimeTolerance),
        lastMsPerPair: clampNumber(raw.lastMsPerPair, 0, 600000, 0),
        lastLevelMs: clampNumber(raw.lastLevelMs, 0, 900000, 0),
        lastLevelPairs: Math.round(clampNumber(raw.lastLevelPairs, 0, 10000, 0)),
        lastLevelComplete: raw.lastLevelComplete === true,
        themeIndex: Math.round(clampNumber(raw.themeIndex, 0, COLOR_THEMES.length - 1, 0)),
        refillTriggerCount: Math.round(clampNumber(raw.refillTriggerCount, 1, 5, DEFAULT_SETTINGS.refillTriggerCount)),
        refillMinMs,
        refillMaxMs,
        pauseRefillWhileSelected: raw.pauseRefillWhileSelected === true,
        recycleMastered: raw.recycleMastered !== false,
        streakTones: raw.streakTones !== false,
        mlRecentHistory: Math.round(clampNumber(raw.mlRecentHistory, 0, 100, DEFAULT_SETTINGS.mlRecentHistory)),
        mlAvoidanceWeight: clampNumber(raw.mlAvoidanceWeight, 0, 1, DEFAULT_SETTINGS.mlAvoidanceWeight),
        langPair: normalizeLangPair(raw.langPair)
      };
    }

    function normalizeLangPair(raw) {
      const a = raw && typeof raw.a === "string" && raw.a.trim() ? raw.a.trim() : DEFAULT_SETTINGS.langPair.a;
      const b = raw && typeof raw.b === "string" && raw.b.trim() ? raw.b.trim() : DEFAULT_SETTINGS.langPair.b;
      return { a, b };
    }

      const normalized = loadSettings({ settings });
      if (normalized.refillMaxMs < normalized.refillMinMs) {
        normalized.refillMaxMs = normalized.refillMinMs;

    function resolveMsPerPair(settings) {
      if (settings.lastMsPerPair > 0) return settings.lastMsPerPair;
      // Migrate older saves that only stored lastLevelMs / lastLevelPairs.
      if (settings.lastLevelMs > 0 && settings.lastLevelPairs > 0) {
        return settings.lastLevelMs / settings.lastLevelPairs;
      }
      return 0;

    function hexToRgb(hex) {
      const normalized = String(hex).replace("#", "");
      const full = normalized.length === 3
        ? normalized.split("").map(ch => ch + ch).join("")
        : normalized;
      const value = parseInt(full, 16);
      return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }

    function rgbToHex({ r, g, b }) {
      const channel = value => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0");
      return `#${channel(r)}${channel(g)}${channel(b)}`;
    }

    function mixHex(fg, bg, weight) {
      const amount = Math.max(0, Math.min(1, weight));
      const a = hexToRgb(fg);
      const b = hexToRgb(bg);
      return rgbToHex({
        r: a.r * amount + b.r * (1 - amount),
        g: a.g * amount + b.g * (1 - amount),
        b: a.b * amount + b.b * (1 - amount)
      });
    }

    function rgbaFromHex(hex, alpha) {
      const { r, g, b } = hexToRgb(hex);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

      root.style.setProperty("--selected-bg", mixHex(theme.blue, fixedBg, 0.2));

      root.style.setProperty("--correct-ink", mixHex(base.text, theme.green, 0.88));
      root.style.setProperty("--correct-shadow", mixHex(theme.greenDark, fixedBg, 0.72));
      root.style.setProperty("--wrong-bg", mixHex(theme.red, fixedBg, 0.2));
      root.style.setProperty("--wrong-ink", mixHex(base.text, theme.red, 0.88));
      root.style.setProperty("--wrong-shadow", mixHex(theme.redDeep, fixedBg, 0.72));
      root.style.setProperty("--on-accent", mixHex(fixedBg, "#000000", 0.42));
      root.style.setProperty("--warn-ink", mixHex(fixedBg, "#000000", 0.28));
      root.style.setProperty("--warn-shadow", mixHex(theme.yellow, fixedBg, 0.62));
      root.style.setProperty("--weak-wrong", mixHex(theme.red, base.text, 0.72));
      root.style.setProperty("--scrim", rgbaFromHex(mixHex(fixedBg, "#000000", 0.35), 0.72));
      root.style.setProperty("--hover-soft", mixHex(base.panel, base.text, 0.06));
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", fixedBg);
      try { localStorage.setItem(THEME_KEY, String(i)); } catch (e) {}
      if (state && state.settings) state.settings.themeIndex = i;
      return i;
